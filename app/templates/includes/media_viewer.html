<div class="modal-shell media-viewer" data-modal="media-viewer" hidden>
    <div class="modal-backdrop" data-close-media-viewer></div>
    <section
        class="modal-card media-viewer__card"
        role="dialog"
        aria-modal="true"
        aria-label="Attachment preview"
    >
        <button
            type="button"
            class="media-viewer__hotspot media-viewer__hotspot--prev"
            data-media-viewer-prev
            aria-label="Previous attachment"
        ></button>
        <button
            type="button"
            class="media-viewer__hotspot media-viewer__hotspot--next"
            data-media-viewer-next
            aria-label="Next attachment"
        ></button>
        <span class="media-viewer__counter" data-media-viewer-counter hidden>1 / 1</span>
        <div class="media-viewer__body" data-media-viewer-body></div>
    </section>
</div>
