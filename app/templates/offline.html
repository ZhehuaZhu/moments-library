<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#2f6354">
    <title>Offline</title>
    <style>
        :root {
            color-scheme: light;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at top, rgba(47, 99, 84, 0.18), transparent 34%),
                #f5f7f6;
            color: #173230;
        }

        main {
            width: min(420px, calc(100vw - 32px));
            padding: 28px 24px;
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 20px 40px rgba(21, 33, 42, 0.12);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 1.5rem;
        }

        p {
            margin: 0;
            line-height: 1.7;
            color: rgba(23, 50, 48, 0.78);
        }
    </style>
</head>
<body>
    <main>
        <h1>暂时离线</h1>
        <p>当前网络不可用。等网络恢复后，再重新打开 Moments Library。</p>
    </main>
</body>
</html>
